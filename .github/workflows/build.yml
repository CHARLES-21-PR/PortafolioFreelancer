name: Build
on:
  push:
    branches:
      - main
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@051838407869675276e5d0a6435c75f24213038a
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
with:
  args: >
    -Dsonar.verbose=true
